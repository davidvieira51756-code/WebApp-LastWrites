name: Deploy Functions

on:
  push:
    branches:
      - main
    paths:
      - functions/**
      - .github/workflows/deploy-functions.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install function dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r functions/requirements.txt

      - name: Package Azure Functions project
        run: |
          set -euo pipefail
          rm -f functions-release.zip
          cd functions
          find . -mindepth 1 \
            ! -path "./.venv/*" \
            ! -path "*/__pycache__/*" \
            ! -name "*.pyc" \
            ! -name "local.settings.json" \
            -printf '%P\n' | zip -r ../functions-release.zip -@

      - name: Azure login
        uses: azure/login@v2
        with:
          # Add this GitHub Secret in repository settings:
          # AZURE_CREDENTIALS -> JSON credentials for azure/login scoped to the target resource group.
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Function App
        run: |
          set -euo pipefail
          az functionapp deployment source config-zip \
            --resource-group "${{ secrets.AZURE_CONTAINERAPPS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_FUNCTIONAPP_NAME }}" \
            --src functions-release.zip \
            --build-remote true \
            --timeout 1800 \
            --only-show-errors
