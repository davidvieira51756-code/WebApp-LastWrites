name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js app
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Prepare standalone deployment package
        run: |
          set -euo pipefail
          cd frontend

          if [ ! -d ".next/standalone" ]; then
            echo "Next.js standalone output was not found."
            echo "Configure next.config.ts with output: 'standalone' and rebuild."
            exit 1
          fi

          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

          if [ -d "public" ]; then
            cp -r public .next/standalone/public
          fi

          cd .next/standalone
          zip -r ../../../frontend-release.zip .

      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # Add this GitHub Secret in your repository settings:
          # AZURE_FRONTEND_WEBAPP_NAME -> Name of your Azure Web App for Next.js frontend.
          app-name: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME }}
          # Add this GitHub Secret in your repository settings:
          # AZURE_FRONTEND_WEBAPP_PUBLISH_PROFILE -> Publish profile XML from Azure App Service.
          publish-profile: ${{ secrets.AZURE_FRONTEND_WEBAPP_PUBLISH_PROFILE }}
          package: frontend-release.zip
