name: Deploy Worker Container

on:
  push:
    branches:
      - main
    paths:
      - worker_container/**
      - .github/workflows/deploy-worker.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: lastwrites-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          # Add these GitHub Secrets in repository settings:
          # ACR_LOGIN_SERVER -> Example: myregistry.azurecr.io
          # ACR_USERNAME -> Azure Container Registry admin username
          # ACR_PASSWORD -> Azure Container Registry admin password
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push worker image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${ACR_LOGIN_SERVER}/${IMAGE_NAME}"

          docker build \
            -f worker_container/Dockerfile \
            -t "${IMAGE_URI}:latest" \
            -t "${IMAGE_URI}:${SHORT_SHA}" \
            worker_container

          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${SHORT_SHA}"
