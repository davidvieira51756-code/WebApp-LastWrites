name: Deploy Worker Container

on:
  push:
    branches:
      - main
    paths:
      - worker_container/**
      - .github/workflows/deploy-worker.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: lastwrites-worker
  JOB_CONTAINER_NAME: delivery-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          # Add these GitHub Secrets in repository settings:
          # ACR_LOGIN_SERVER -> Example: myregistry.azurecr.io
          # ACR_USERNAME -> Azure Container Registry admin username
          # ACR_PASSWORD -> Azure Container Registry admin password
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push worker image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${ACR_LOGIN_SERVER}/${IMAGE_NAME}"

          docker build \
            -f worker_container/Dockerfile \
            -t "${IMAGE_URI}:latest" \
            -t "${IMAGE_URI}:${SHORT_SHA}" \
            worker_container

          docker push "${IMAGE_URI}:latest"
          docker push "${IMAGE_URI}:${SHORT_SHA}"

      - name: Azure login
        uses: azure/login@v2
        with:
          # Add this GitHub Secret in repository settings:
          # AZURE_CREDENTIALS -> Service principal JSON with access to the Container Apps job resource group.
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Container Apps CLI support
        run: |
          az extension add --name containerapp --upgrade --only-show-errors

      - name: Update Container Apps job image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          RESOURCE_GROUP: ${{ secrets.AZURE_CONTAINERAPPS_RESOURCE_GROUP }}
          JOB_NAME: ${{ secrets.AZURE_CONTAINERAPPS_JOB_NAME }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest"

          az containerapp job registry set \
            --name "${JOB_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --server "${ACR_LOGIN_SERVER}" \
            --username "${ACR_USERNAME}" \
            --password "${ACR_PASSWORD}" \
            --only-show-errors

          az containerapp job update \
            --name "${JOB_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --container-name "${JOB_CONTAINER_NAME}" \
            --image "${IMAGE_URI}" \
            --only-show-errors
