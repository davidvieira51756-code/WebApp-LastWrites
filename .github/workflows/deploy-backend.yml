name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Build backend deployment package
        run: |
          cd backend
          zip -r ../backend-release.zip . -x "__pycache__/*" "*.pyc"

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # Add this GitHub Secret in your repository settings:
          # AZURE_BACKEND_WEBAPP_NAME -> Name of your Azure Web App for FastAPI backend.
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
          # Add this GitHub Secret in your repository settings:
          # AZURE_BACKEND_WEBAPP_PUBLISH_PROFILE -> Publish profile XML from Azure App Service.
          publish-profile: ${{ secrets.AZURE_BACKEND_WEBAPP_PUBLISH_PROFILE }}
          package: backend-release.zip
